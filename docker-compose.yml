version: "3.9"

services:
  # ── Single-node optimizer with telemetry dashboard ──────────────────────────
  optimizer:
    build: .
    image: smart-bandwidth-optimizer:latest
    container_name: bwopt
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      # Override via environment or .env file
      - BW_MODE=local_server
      - BW_LIMIT=10485760      # 10 MB/s
    command:
      - python
      - main.py
      - serve
      - --host
      - "0.0.0.0"
      - --port
      - "8000"
      - --coordinator        # enable multi-node coordinator
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

