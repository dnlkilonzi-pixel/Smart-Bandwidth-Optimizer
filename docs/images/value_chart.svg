<rect x="18" y="378" width="704" height="26" rx="4" fill="#1e293b"/>
<text x="370" y="395" font-family="system-ui,-apple-system,'Segoe UI',Helvetica,Arial,sans-serif" font-size="11" fill="white" text-anchor="middle" font-weight="400">effective_value = value_coefficient × priority_multiplier   |   Queue overflow: lowest effective_value is evicted first</text>
